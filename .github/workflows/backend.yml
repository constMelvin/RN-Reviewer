name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - "client/**"
      - "server/**"
      - "docker-compose.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd ~/RN-Reviewer
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker exec rn-server bun run db:migrate
